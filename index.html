<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="robots" content="index, follow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A client-side webpage to count down the days until school ends.">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="styles.css">
  <link rel="canonical" href="https://29miaoet.github.io/timeuntil/">

  <title>Time Until</title>
</head>
<body>
  <div class="menu">
    <button type="button" class="option settings">⚙️</button>
    <button type="button" class="option settings">⏳</button>
    <a class="option github-icon" href="https://github.com/29miaoet/timeuntil" target="_blank">
      <img src="github.svg" alt="GitHub logo">
    </a>
  </div>

  <h1>Time Until</h1>
  <div class="card-container">
  <div class="card countdown-container">
    <h2>School Time Remaining</h2>
    <hr>
    <div class="school-time">
      <div class="timeunit">
        <div class="timebox">00</div>
        <span class="timelabel">days</span>
      </div>

      <div class="timeunit">
        <div class="timebox">00</div>
        <span class="timelabel">hours</span>
      </div>

      <div class="timeunit">
        <div class="timebox">00</div>
        <span class="timelabel">minutes</span>
      </div>

      <div class="timeunit">
        <div class="timebox">00</div>
        <span class="timelabel">seconds</span>
      </div>
    </div>

    <h2>Total Time Remaining</h2>
    <hr>
    <div class="school-time">
      <div class="timeunit">
        <div class="timebox">00</div>
        <span class="timelabel">days</span>
      </div>

      <div class="timeunit">
        <div class="timebox">00</div>
        <span class="timelabel">hours</span>
      </div>

      <div class="timeunit">
        <div class="timebox">00</div>
        <span class="timelabel">minutes</span>
      </div>

      <div class="timeunit">
        <div class="timebox">00</div>
        <span class="timelabel">seconds</span>
      </div>
    </div>


    <h2>Absolute Time Remaining</h2>
    <hr>
    <div class="abs-time">
      <div class="times">
        <div class="timebox">00</div>
        <div class="timebox">00</div>
        <div class="timebox">00</div>
        <div class="timebox">00</div>
      </div>
      <div class="timelabels">
        <div class="timelabel">days</div>
        <div class="timelabel">hours</div>
        <div class="timelabel">minutes</div>
        <div class="timelabel">seconds</div>
      </div>
    </div>

  </div>

  <div class="card progress-bar">
    <div class="bar">
      <div class="progress"></div>
    </div>
    <p id="percentage">50%<span> percent finished</p>
  </div>

  <div class="card day-info">
    <div class="day-card">
      <p class="card-title">Status</p>
      <hr>
      <p class="card-content">null</p>
    </div>
    <div class="day-card">
      <p class="card-title">Feature</p>
      <hr>
      <p class="card-content">null</p>
    </div>
    <div class="day-card">
      <p class="card-title">Event</p>
      <hr>
      <p class="card-content">null</p>
    </div>
  </div>
  </div>

  <footer>
    &copy 2026 — Ethan Miao — MIT License
  </footer>


</body>

</html>
