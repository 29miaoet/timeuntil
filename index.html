<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="robots" content="index, follow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A client-side webpage to count down the days until school ends.">

  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="stylesheet" href="styles.css">
  <link rel="canonical" href="https://29miaoet.github.io/timeuntil/">

  <title>Time Until</title>
</head>
<body>
  <h1>Time Until</h1>
  <div class="countdown-container">
    <h2>School Time Remaining</h2>
    <div class="school-time">
      <div class="timeunit">
        <div class="timebox">00</div>
        <span class="timelabel">days</span>
      </div>

      <div class="timeunit">
        <div class="timebox">00</div>
        <span class="timelabel">hours</span>
      </div>

      <div class="timeunit">
        <div class="timebox">00</div>
        <span class="timelabel">minutes</span>
      </div>

      <div class="timeunit">
        <div class="timebox">00</div>
        <span class="timelabel">seconds</span>
      </div>
    </div>

    <h2>Total Time Remaining</h2>
    <div class="school-time">
      <div class="timeunit">
        <div class="timebox">00</div>
        <span class="timelabel">days</span>
      </div>

      <div class="timeunit">
        <div class="timebox">00</div>
        <span class="timelabel">hours</span>
      </div>

      <div class="timeunit">
        <div class="timebox">00</div>
        <span class="timelabel">minutes</span>
      </div>

      <div class="timeunit">
        <div class="timebox">00</div>
        <span class="timelabel">seconds</span>
      </div>
    </div>

  </div>


</body>

</html>
